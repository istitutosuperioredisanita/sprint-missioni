name: Publish package to GitHub Packages
on:
  push:
    branches: [master, modifiche-iss]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # Pubblica ace-client-iss
      - name: Publish ace-client-iss
        if: hashFiles('ace-client-iss/pom.xml') != ''
        run: |
          cd ace-client-iss
          mvn clean deploy -s ../.m2/settings.xml --batch-mode --errors --fail-at-end --show-version -DskipTests
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Pubblica happysign-client
      - name: Publish happysign-client
        if: hashFiles('happysign-client/pom.xml') != ''
        run: |
          cd happysign-client
          mvn clean deploy -s ../.m2/settings.xml --batch-mode --errors --fail-at-end --show-version -DskipTests
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-main:
    needs: publish-dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # Pubblica il progetto principale
      - name: Publish main project
        run: mvn clean deploy -s .m2/settings.xml --batch-mode --errors --fail-at-end --show-version -DskipTests
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.Token }}
